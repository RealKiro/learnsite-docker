version: '3.8'

services:
  learnsite:
    # 镜像名：请将 orzg 替换为您的 Docker Hub 用户名
    image: orzg/learnsite-web:latest
    container_name: learnsite

    # ===== 网络模式选择 =====
    # 默认使用 host 模式，如需 bridge 模式，请取消下面 network_mode 行的注释，并注释掉 host 行。
    network_mode: host
    # network_mode: bridge
    # ports:
    #   - "8080:8080"                # bridge 模式下需取消注释并映射端口

    volumes:
      # 源码和状态持久化：使用相对路径，所有数据保存在当前目录的 app 子目录中
      - ./app:/app

    environment:
      - MONO_IOMAP=all
      # 数据库主机地址：统一使用 Docker 内置 DNS 名称 host.docker.internal
      # 无论 host 还是 bridge 模式，此地址均可访问宿主机上的服务
      - DB_HOST=host.docker.internal
      - DB_NAME=learnsite
      - DB_USER=sa
      # ↓↓↓ 【必须修改】必须与 MSSQL_SA_PASSWORD 保持一致 ↓↓↓
      - DB_PASSWORD=YourStrong@Passw0rd123
      # 是否自动更新源码：设置为true时，容器启动时会自动从仓库拉取最新源码
      # 设置为false时，使用本地已有的源码，适合需要自定义修改的场景
      - AUTO_UPDATE_SOURCE=false

      # 源码仓库地址（可选，如不设置则使用镜像内的默认值）
      - PRIMARY_REPO_URL=https://gitee.com/nylon26/openlearnsite.git
      # 备用仓库地址设置为空，禁用备用仓库
      - FALLBACK_REPO_URL=
      # ↓↓↓ 【可选】指定源码分支，默认为master，设置为main可使用main分支 ↓↓↓
      - BRANCH=master
    restart: unless-stopped
    depends_on:
      mssql:
        condition: service_healthy

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd123
      - MSSQL_PID=Express
      - TZ=Asia/Shanghai
      - MSSQL_COLLATION=Chinese_PRC_CI_AS
    volumes:
      - ./data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd123' -C -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: >
      sh -c "
        /opt/mssql/bin/sqlservr &
        sleep 30 &&
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd123' -C -Q \"
          EXEC sp_configure 'show advanced options', 1;
          RECONFIGURE;
          EXEC sp_configure 'remote login timeout', 30;
          RECONFIGURE;
          EXEC sp_configure 'remote query timeout', 600;
          RECONFIGURE;
          EXEC sp_configure 'remote proc trans', 0;
          RECONFIGURE;
        \"
        wait
      "