version: '3.8'

services:
  mssql:
    # 使用变量 ${DOCKER_USERNAME}，在 CI 中通过环境变量注入实际用户名
    image: ${DOCKER_USERNAME}/mssql-learnsite:latest
    container_name: mssql-ci
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - PUID=1000
      - PGID=1000
      - PRIMARY_SQL_URL=https://raw.githubusercontent.com/aymwoo/learnsite-wz/master/sql/learnsite.sql
      - FALLBACK_SQL_URL=https://gitee.com/jnschool/learnsite-wz/raw/main/sql/learnsite.sql
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - learnsite-net
    restart: "no"

  learnsite:
    image: ${DOCKER_USERNAME}/learnsite-web:latest
    container_name: learnsite-ci
    ports:
      - "8080:8080"
    volumes:
      - learnsite_data:/app
    environment:
      - MONO_IOMAP=all
      - DB_HOST=mssql
      - DB_NAME=learnsite
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      # 是否自动更新源码：设置为true时，容器启动时会自动从仓库拉取最新源码
      # 设置为false时，使用本地已有的源码，适合需要自定义修改的场景
      - AUTO_UPDATE_SOURCE=false
      - PRIMARY_REPO_URL=https://github.com/RealKiro/learnsite.git
      - FALLBACK_REPO_URL=https://gitee.com/realiy/learnsite.git
      # ↓↓↓ 【可选】指定源码分支，默认为main，设置为dev可使用dev分支 ↓↓↓
      - BRANCH=main
    networks:
      - learnsite-net
    restart: "no"
    depends_on:
      - mssql

volumes:
  learnsite_data:
  mssql_data:

networks:
  learnsite-net:
    driver: bridge