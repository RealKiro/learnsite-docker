services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-ci
    user: root
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Express
      - TZ=Asia/Shanghai
      - MSSQL_COLLATION=Chinese_PRC_CI_AS
    volumes:
      - mssql_data:/var/opt/mssql
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD}' -C -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - learnsite

  learnsite:
    image: ${DOCKER_USERNAME}/learnsite-web:dev
    container_name: learnsite-ci
    ports:
      - "8080:8080"
    volumes:
      - learnsite_data:/app
    environment:
      - MONO_IOMAP=all
      - DB_HOST=mssql
      - DB_NAME=learnsite
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - AUTO_UPDATE_SOURCE=false
      - PRIMARY_REPO_URL=https://gitee.com/nylon26/openlearnsite.git
      - FALLBACK_REPO_URL=
      - BRANCH=dev
    restart: "no"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - learnsite

volumes:
  learnsite_data:
  mssql_data:

networks:
  learnsite:
    name: learnsite
    driver: bridge