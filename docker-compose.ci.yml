version: '3.8'

services:
  mssql:
    # 使用变量 ${DOCKER_USERNAME}，在 CI 中通过环境变量注入实际用户名
    image: ${DOCKER_USERNAME}/mssql-learnsite:latest
    container_name: mssql-ci
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - PUID=1000
      - PGID=1000
      - PRIMARY_SQL_URL=https://gitee.com/nylon26/openlearnsite/raw/${BRANCH:-master}/sql/learnsite.sql
      # 【可选】备用SQL文件下载地址，留空由客户自行填写
      # - FALLBACK_SQL_URL=
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - learnsite-net
    restart: "no"

  learnsite:
    image: ${DOCKER_USERNAME}/learnsite-web:latest
    container_name: learnsite-ci
    ports:
      - "8080:8080"
    volumes:
      - learnsite_data:/app
    environment:
      - MONO_IOMAP=all
      - DB_HOST=mssql
      - DB_NAME=learnsite
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      # 是否自动更新源码：设置为true时，容器启动时会自动从仓库拉取最新源码
      # 设置为false时，使用本地已有的源码，适合需要自定义修改的场景
      - AUTO_UPDATE_SOURCE=false
      - PRIMARY_REPO_URL=https://gitee.com/nylon26/openlearnsite.git
      # 备用仓库地址设置为空，禁用备用仓库
      - FALLBACK_REPO_URL=
      # ↓↓↓ 【可选】指定源码分支，默认为master，设置为main可使用main分支 ↓↓↓
      - BRANCH=master
    networks:
      - learnsite-net
    restart: "no"
    depends_on:
      - mssql

volumes:
  learnsite_data:
  mssql_data:

networks:
  learnsite-net:
    driver: bridge