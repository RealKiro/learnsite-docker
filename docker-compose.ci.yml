version: '3.8'

services:
  mssql:
    # 使用变量 ${DOCKER_USERNAME}，在 CI 中通过环境变量注入实际用户名
    image: ${DOCKER_USERNAME}/mssql-learnsite:latest
    container_name: mssql-ci
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - PUID=1000
      - PGID=1000
      - PRIMARY_SQL_URL=https://raw.githubusercontent.com/RealKiro/learnsite/refs/heads/main/sql/learnsite.sql
      - FALLBACK_SQL_URL=https://gitee.com/realiy/learnsite/raw/main/sql/learnsite.sql
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - learnsite-net
    restart: "no"

  learnsite:
    image: ${DOCKER_USERNAME}/learnsite-web:latest
    container_name: learnsite-ci
    ports:
      - "8080:8080"
    volumes:
      - learnsite_data:/app
    environment:
      - MONO_IOMAP=all
      - DB_HOST=172.17.0.1
      - DB_NAME=learnsite
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      - AUTO_UPDATE_SOURCE=false
      - PRIMARY_REPO_URL=https://github.com/RealKiro/learnsite.git
      - FALLBACK_REPO_URL=https://gitee.com/realiy/learnsite.git
    networks:
      - learnsite-net
    restart: "no"
    depends_on:
      - mssql

volumes:
  learnsite_data:
  mssql_data:

networks:
  learnsite-net:
    driver: bridge