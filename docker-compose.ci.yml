# 此文件用于 GitHub Actions 自动测试，客户一般无需修改。
# 如果您需要在本地模拟 CI 环境，可以按需调整。

services:
  mssql:
    # 镜像名使用变量 ${DOCKER_USERNAME}，在 CI 中通过环境变量注入
    image: ${DOCKER_USERNAME}/mssql-learnsite:latest
    container_name: mssql-ci
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}   # 从环境变量读取密码
      - PUID=1000
      - PGID=1000
      - PRIMARY_SQL_URL=https://raw.githubusercontent.com/RealKiro/learnsite/refs/heads/main/sql/learnsite.sql
      - FALLBACK_SQL_URL=https://gitee.com/realiy/learnsite/raw/main/sql/learnsite.sql
    ports:
      - "1433:1433"      # 桥接模式，映射端口到宿主机
    volumes:
      - mssql_data:/var/opt/mssql   # 使用命名卷，避免文件权限问题
    networks:
      - learnsite-net
    restart: "no"        # CI 环境中不需要自动重启

  learnsite:
    image: ${DOCKER_USERNAME}/learnsite-web:latest
    container_name: learnsite-ci
    ports:
      - "8080:8080"
    volumes:
      - learnsite_data:/app
    environment:
      - MONO_IOMAP=all
      - DB_HOST=172.17.0.1
      - DB_NAME=learnsite
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}   # 从环境变量读取密码
      - AUTO_UPDATE_SOURCE=false
      - PRIMARY_REPO_URL=https://github.com/RealKiro/learnsite.git
      - FALLBACK_REPO_URL=https://gitee.com/realiy/learnsite.git
    networks:
      - learnsite-net
    restart: "no"
    depends_on:
      - mssql

volumes:
  learnsite_data:
  mssql_data:

networks:
  learnsite-net:
    driver: bridge