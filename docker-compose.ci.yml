version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-ci
    user: root
    # ===== 网络模式选择 =====
    # 默认使用 host 模式，容器直接使用宿主机网络
    # 如果端口被占用，请切换到 bridge 模式
    network_mode: host
    # network_mode: bridge
    # ports:
    #   - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Express
      - TZ=Asia/Shanghai
      - MSSQL_COLLATION=Chinese_PRC_CI_AS
    volumes:
      - mssql_data:/var/opt/mssql
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD}' -C -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - learnsite

  learnsite:
    image: ${DOCKER_USERNAME}/learnsite-web:dev
    container_name: learnsite-ci
    # ===== 网络模式选择 =====
    # 默认使用 host 模式，容器直接使用宿主机网络
    # 如果端口被占用，请切换到 bridge 模式
    network_mode: host
    # network_mode: bridge
    # ports:
    #   - "8080:8080"
    volumes:
      - learnsite_data:/app
    environment:
      - MONO_IOMAP=all
      # 数据库连接地址：host模式下使用127.0.0.1，bridge模式下使用服务名mssql
      - DB_HOST=127.0.0.1
      # bridge模式时取消注释：
      # - DB_HOST=mssql
      - DB_NAME=learnsite
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD}
      # 是否自动更新源码：设置为true时，容器启动时会自动从仓库拉取最新源码
      # 设置为false时，使用本地已有的源码，适合需要自定义修改的场景
      - AUTO_UPDATE_SOURCE=false
      - PRIMARY_REPO_URL=https://gitee.com/nylon26/openlearnsite.git
      # 备用仓库地址设置为空，禁用备用仓库
      - FALLBACK_REPO_URL=
      # ↓↓↓ 【可选】指定源码分支，默认为master，设置为dev可使用dev分支 ↓↓↓
      - BRANCH=dev
    restart: "no"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - learnsite

volumes:
  learnsite_data:
  mssql_data:

networks:
  learnsite:
    name: learnsite
    driver: bridge