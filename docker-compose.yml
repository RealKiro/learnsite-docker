version: '3.8'

services:
  learnsite:
    image: orzg/learnsite-web:latest
    container_name: learnsite

    network_mode: host
    # network_mode: bridge
    # ports:
    #   - "8080:8080"

    volumes:
      - ./app:/app
    environment:
      - MONO_IOMAP=all
      - DB_HOST=172.17.0.1
      - DB_NAME=learnsite
      - DB_USER=sa
      # ↓↓↓ 【必须修改】必须与 MSSQL_SA_PASSWORD 保持一致 ↓↓↓
      - DB_PASSWORD=YourStrong!Password123
      - AUTO_UPDATE_SOURCE=false
      - PRIMARY_REPO_URL=https://gitee.com/realiy/learnsite.git
      - FALLBACK_REPO_URL=https://github.com/RealKiro/learnsite.git
    restart: unless-stopped
    depends_on:
      - mssql

  mssql:
    image: orzg/mssql-learnsite:latest
    container_name: mssql

    network_mode: host
    # network_mode: bridge
    # ports:
    #   - "1433:1433"

    volumes:
      - ./data:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
      # ↓↓↓ 【必须修改】请设置与 DB_PASSWORD 相同的强密码 ↓↓↓
      - MSSQL_SA_PASSWORD=YourStrong!Password123
      - PUID=1000
      - PGID=1000
      - PRIMARY_SQL_URL=https://raw.githubusercontent.com/RealKiro/learnsite/refs/heads/main/sql/learnsite.sql
      - FALLBACK_SQL_URL=https://gitee.com/realiy/learnsite/raw/main/sql/learnsite.sql
    restart: unless-stopped