version: '3.8'

services:
  learnsite:
    image: orzg/learnsite-web:latest
    container_name: learnsite
    # ===== 网络模式选择 =====
    # 默认使用 host 模式，容器直接使用宿主机网络
    # 如果 8080 或 1433 端口被占用，请取消下面 bridge 模式的注释，注释掉 host 模式
    network_mode: host
    # network_mode: bridge
    # ports:
    #   - "8080:8080"                # bridge 模式下需取消注释并映射端口
    volumes:
      - ./app:/app
    environment:
      - MONO_IOMAP=all
      # 数据库连接地址：host模式下使用127.0.0.1，bridge模式下使用服务名mssql
      - DB_HOST=127.0.0.1
      # bridge模式时取消注释：
      # - DB_HOST=mssql
      - DB_NAME=learnsite
      - DB_USER=sa
      # ↓↓↓ 【必须修改】必须与 MSSQL_SA_PASSWORD 保持一致 ↓↓↓
      - DB_PASSWORD=YourStrong@Passw0rd123
      # 是否自动更新源码：设置为true时，容器启动时会自动从仓库拉取最新源码
      # 设置为false时，使用本地已有的源码，适合需要自定义修改的场景
      - AUTO_UPDATE_SOURCE=false
      - PRIMARY_REPO_URL=https://gitee.com/nylon26/openlearnsite.git
      # 备用仓库地址设置为空，禁用备用仓库
      - FALLBACK_REPO_URL=
      # ↓↓↓ 【可选】指定源码分支，默认为master，设置为main可使用main分支 ↓↓↓
      - BRANCH=master
    restart: unless-stopped
    depends_on:
      mssql:
        condition: service_healthy

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    restart: unless-stopped
    user: root
    # ===== 网络模式选择 =====
    # 默认使用 host 模式，容器直接使用宿主机网络
    # 如果端口被占用，请切换到 bridge 模式
    network_mode: host
    # network_mode: bridge
    # ports:
    #   - "1433:1433"                # bridge 模式下需取消注释并映射端口
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd123
      - MSSQL_PID=Express
      - TZ=Asia/Shanghai
      - MSSQL_COLLATION=Chinese_PRC_CI_AS
    volumes:
      - ./data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd123' -C -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s