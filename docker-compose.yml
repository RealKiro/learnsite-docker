version: '3.8'

services:
  learnsite:
    image: orzg/learnsite-web:latest
    container_name: learnsite

    network_mode: host
    # network_mode: bridge
    # ports:
    #   - "8080:8080"

    volumes:
      - ./app:/app
    environment:
      - MONO_IOMAP=all
      - DB_HOST=host.docker.internal
      - DB_NAME=learnsite
      - DB_USER=sa
      # ↓↓↓ 【必须修改】必须与 MSSQL_SA_PASSWORD 保持一致 ↓↓↓
      - DB_PASSWORD=YourStrong!Password123
      # 是否自动更新源码：设置为true时，容器启动时会自动从仓库拉取最新源码
      # 设置为false时，使用本地已有的源码，适合需要自定义修改的场景
      - AUTO_UPDATE_SOURCE=false
      - PRIMARY_REPO_URL=https://gitee.com/nylon26/openlearnsite.git
      # 【可选】备用仓库地址，留空由客户自行填写
      # - FALLBACK_REPO_URL=
      # ↓↓↓ 【可选】指定源码分支，默认为master，设置为main可使用main分支 ↓↓↓
      - BRANCH=master
    restart: unless-stopped
    depends_on:
      - mssql

  mssql:
    image: orzg/mssql-learnsite:latest
    container_name: mssql

    network_mode: host
    # network_mode: bridge
    # ports:
    #   - "1433:1433"

    volumes:
      - ./data:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
      # ↓↓↓ 【必须修改】请设置与 DB_PASSWORD 相同的强密码 ↓↓↓
      - MSSQL_SA_PASSWORD=YourStrong!Password123
      - PUID=1000
      - PGID=1000
      # SQL 文件下载地址（可选，如不设置则使用镜像内的默认值）
      - PRIMARY_SQL_URL=https://gitee.com/nylon26/openlearnsite/raw/${BRANCH:-master}/sql/learnsite.sql
      # 【可选】备用SQL文件下载地址，留空由客户自行填写或通过环境变量覆盖
      # - FALLBACK_SQL_URL=
      # ↓↓↓ 【可选】指定源码分支，默认为master，设置为main可使用main分支 ↓↓↓
      - BRANCH=master
    restart: unless-stopped
