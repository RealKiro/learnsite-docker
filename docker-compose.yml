version: '3.8'

services:
  learnsite:
    image: orzg/learnsite-web:latest
    container_name: learnsite
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app
    environment:
      - MONO_IOMAP=all
      - DB_HOST=mssql
      - DB_NAME=learnsite
      - DB_USER=sa
      # ↓↓↓ 【必须修改】必须与 MSSQL_SA_PASSWORD 保持一致 ↓↓↓
      - DB_PASSWORD=YourStrong@Passw0rd123
      # 是否自动更新源码：设置为true时，容器启动时会自动从仓库拉取最新源码
      # 设置为false时，使用本地已有的源码，适合需要自定义修改的场景
      - AUTO_UPDATE_SOURCE=false
      - PRIMARY_REPO_URL=https://gitee.com/nylon26/openlearnsite.git
      # 备用仓库地址设置为空，禁用备用仓库
      - FALLBACK_REPO_URL=
      # ↓↓↓ 【可选】指定源码分支，默认为master，设置为main可使用main分支 ↓↓↓
      - BRANCH=master
    restart: unless-stopped
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - learnsite-net

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    restart: unless-stopped
    user: root
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd123
      - MSSQL_PID=Express
      - TZ=Asia/Shanghai
      - MSSQL_COLLATION=Chinese_PRC_CI_AS
    volumes:
      - mssql_data:/var/opt/mssql
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd123' -C -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - learnsite-net

volumes:
  mssql_data:

networks:
  learnsite-net:
    driver: bridge