name: Build Dev Image (Mono)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          path: my-repo

      - name: Clone source from GitHub
        run: |
          git clone --depth 1 --branch main https://github.com/RealKiro/learnsite.git app-source

      - name: Replace with custom configs
        run: |
          cp my-repo/web.config app-source/ 2>/dev/null || echo "⚠️ web.config not found"
          cp my-repo/Dockerfile app-source/ || echo "⚠️ Dockerfile not found"
          cp my-repo/entrypoint.sh app-source/ || echo "⚠️ entrypoint.sh not found"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull base image (mono)
        run: docker pull mono:latest

      - name: Build original image
        uses: docker/build-push-action@v5
        with:
          context: ./app-source
          file: ./app-source/Dockerfile
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/learnsite-web:build-${{ github.sha }}

      # 可选：如果需要对镜像瘦身，可在此安装 mint 并进行 slim，当前保持原样
      - name: Tag as dev
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/learnsite-web:build-${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/learnsite-web:dev

      # 推送 dev 镜像
      - name: Push dev image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/learnsite-web:dev

      - name: Clean up
        if: always()
        run: |
          docker rmi ${{ secrets.DOCKER_USERNAME }}/learnsite-web:build-${{ github.sha }} || true
          docker image prune -f