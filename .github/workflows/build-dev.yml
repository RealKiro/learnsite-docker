name: Build Dev Image with SlimToolkit

on:
  push:
    branches: [ main, master ]          # 每次推送到 main/master 时自动构建 dev
  workflow_dispatch:                     # 也支持手动触发

jobs:
  build-dev:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出当前仓库（包含自定义配置）
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          path: my-repo

      # 2. 从 GitHub 拉取 LearnSite 源码（固定 main 分支）
      - name: Clone source from GitHub
        run: |
          echo "Cloning from https://github.com/RealKiro/learnsite.git (main branch)..."
          git clone --depth 1 --branch main https://github.com/RealKiro/learnsite.git app-source

      # 3. 用仓库中的自定义配置覆盖源码中的对应文件
      - name: Replace with custom configs
        run: |
          cp my-repo/web.config app-source/ 2>/dev/null || echo "⚠️ Warning: web.config not found in my-repo, using default from source."
          cp my-repo/Dockerfile app-source/ || echo "⚠️ Warning: Dockerfile not found in my-repo, using default from source."
          cp my-repo/entrypoint.sh app-source/ || echo "⚠️ Warning: entrypoint.sh not found in my-repo, using default from source."

      # 4. 登录 Docker Hub（需提前在 Secrets 中配置 DOCKER_USERNAME 和 DOCKER_PASSWORD）
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. 显式拉取基础镜像（带重试）
      - name: Pull base image with retry
        run: |
          for i in {1..3}; do
            echo "Attempt $i to pull mono:latest..."
            docker pull mono:latest && break || { echo "Pull failed, retry in 10s"; sleep 10; }
          done

      # 6. 构建原始镜像（中间产物），使用 secrets.DOCKER_USERNAME 打标签
      - name: Build original image
        uses: docker/build-push-action@v5
        with:
          context: ./app-source
          file: ./app-source/Dockerfile
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/learnsite-web:build-${{ github.sha }}

      # 7. 安装 Mint (SlimToolkit) - 直接下载二进制并复制所有文件
      - name: Install Mint (SlimToolkit) binary
        run: |
          MINT_VERSION="1.41.8"
          wget -O /tmp/mint.tar.gz "https://github.com/mintoolkit/mint/releases/download/${MINT_VERSION}/dist_linux.tar.gz"
          tar -xzf /tmp/mint.tar.gz -C /tmp
          # 将解压后的所有文件（包括 mint-sensor）复制到 /usr/local/bin
          sudo cp -r /tmp/dist_linux/* /usr/local/bin/
          sudo chmod +x /usr/local/bin/mint /usr/local/bin/mint-sensor
          mint --version

      # 8. 使用 Mint 对镜像进行瘦身，生成 dev 标签
      - name: Slim the image with Mint
        run: |
          mint build \
            --http-probe=false \
            --tag ${{ secrets.DOCKER_USERNAME }}/learnsite-web:dev \
            ${{ secrets.DOCKER_USERNAME }}/learnsite-web:build-${{ github.sha }}

      # 9. 为了测试，将 dev 镜像临时标记为 latest
      - name: Tag dev as latest for testing
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/learnsite-web:dev ${{ secrets.DOCKER_USERNAME }}/learnsite-web:latest

      # 10. 将测试用的 Compose 文件复制到工作目录
      - name: Copy test compose file
        run: cp my-repo/docker-compose.ci.yml .

      # 11. 拉取 MSSQL 镜像（确保存在）
      - name: Pull MSSQL image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/mssql-learnsite:latest

      # 12. 运行集成测试
      - name: Run integration tests
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          MSSQL_SA_PASSWORD="$DB_PASSWORD" \
          DB_PASSWORD="$DB_PASSWORD" \
          docker compose -f docker-compose.ci.yml up -d
          echo "Waiting 30 seconds for services to start..."
          sleep 30
          if ! curl -f --retry 5 --retry-delay 5 http://localhost:8080; then
            echo "❌ Web test failed. Dumping learnsite container logs:"
            docker logs learnsite-ci
            exit 1
          fi
          echo "✅ Web service responded successfully."
          docker compose -f docker-compose.ci.yml down

      # 13. 推送 dev 镜像到 Docker Hub（测试通过后）
      - name: Push dev image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/learnsite-web:dev

      # 14. 清理中间镜像和临时标签
      - name: Clean up
        if: always()
        run: |
          docker rmi ${{ secrets.DOCKER_USERNAME }}/learnsite-web:build-${{ github.sha }} || true
          docker rmi ${{ secrets.DOCKER_USERNAME }}/learnsite-web:latest || true
          docker image prune -f